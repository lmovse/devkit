name: Build and Push Images

on:
  push:
    branches:
      - main
    paths:
      - 'images/**'
  pull_request:
    branches:
      - main
    paths:
      - 'images/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.diff.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Diff version.json
        id: diff
        run: |
          VERSION_FILE="images/version.json"

          # version.json 不存在则跳过
          if [ ! -f "$VERSION_FILE" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
            exit 0
          fi

          CURR=$(cat "$VERSION_FILE")

          # 尝试获取上一次的 version.json
          PREV=$(git show HEAD^:"$VERSION_FILE" 2>/dev/null || echo "{}")

          # 找出版本号有变化的镜像
          MATRIX=$(jq -cn \
            --argjson prev "$PREV" \
            --argjson curr "$CURR" \
            '[
              $curr | to_entries[] |
              select(.value != $prev[.key]) |
              { image: .key, version: .value }
            ]')

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Changed: $MATRIX"

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.matrix != '[]' && needs.detect-changes.outputs.matrix != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ matrix.version }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
